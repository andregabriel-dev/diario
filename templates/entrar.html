{% extends 'base.html' %}
{% block conteudo %}
<section class="painel ativa" style="display: flex; align-items: center; justify-content: center; min-height: 60svh;">
    <div class="cartao cartao-entrar" style="max-width: 380px; width: 100%; text-align: center;">
        <h1 class="titulo-entrar" style="font-family: 'Fraunces', serif; font-size: 1.5rem; margin: 0 0 6px;">✨ Entrar no Diário</h1>
        <p style="color: var(--tinta-suave); font-size: 0.9rem; margin: 0 0 20px;">Digite suas credenciais para acessar os rolês.</p>
        
        <form method="POST">
            <div class="campo" style="text-align: left; margin-bottom: 14px;">
                <label for="usuario" style="display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; margin-bottom: 7px; color: var(--tinta-suave);">Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="Ex: andre ou joyce" required style="width: 100%; font-family: 'Inter', sans-serif; font-size: 1rem; padding: 12px 14px; border: 1.5px solid var(--papel-escuro); border-radius: 12px; background: var(--papel); color: var(--tinta);">
            </div>

            <div class="campo" style="text-align: left; margin-bottom: 18px;">
                <label for="senha" style="display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; margin-bottom: 7px; color: var(--tinta-suave);">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Sua senha" required style="width: 100%; font-family: 'Inter', sans-serif; font-size: 1rem; padding: 12px 14px; border: 1.5px solid var(--papel-escuro); border-radius: 12px; background: var(--papel); color: var(--tinta);">
            </div>

            <button type="submit" class="botao-principal" style="width: 100%;">Entrar</button>
        </form>

        {% if erro %}
            <div class="flash flash-erro" style="margin-top: 14px;">{{ erro }}</div>
        {% endif %}
    </div>
</section>
{% endblock %}
